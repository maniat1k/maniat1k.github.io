name: Refresh Feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build feed JSON
        env:
          YOUTUBE_HANDLE: maniat1kUy
          REDDIT_USER: maniat1k13
          X_HANDLE: maniat1kUy
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          INSTAGRAM_RSS_URL: ${{ secrets.INSTAGRAM_RSS_URL }}
          X_RSS_URL: ${{ secrets.X_RSS_URL }}
        run: npm run feeds:build

      - name: Commit updated feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/*.data.js data/*.manual.json assets/cards assets/fallback
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh social feeds"
          git push
