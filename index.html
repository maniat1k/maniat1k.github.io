<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>codigopersonal</title>
  <style>
    body {
      background: black url('cover.webp') no-repeat center center fixed;
      background-size: cover;
      color: #00FF00;
      font-family: monospace;
      margin: 0;
      padding: 2rem;
      text-shadow: 0 0 5px #00FF00;
    }

    .contenedor {
      background-color: rgba(0, 0, 0, 0.85);
      padding: 2rem;
      border: 1px solid #00FF00;
      max-width: 900px;
      margin: auto;
    }

    .intro {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 2px solid #00FF00;
      object-fit: cover;
    }

    .intro-text {
      flex: 1;
    }

    h1, h2 {
      color: #00FF00;
      margin: 0;
    }

    a {
      color: #00FF00;
      text-decoration: underline;
    }

    ul {
      list-style-type: "> ";
      padding-left: 1rem;
    }

    .cursor {
      animation: blink 1s step-start infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @media (max-width: 768px) {
      .intro {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .intro-text {
        margin-top: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="intro">
      <img src="cat.jpg" alt="Avatar de codigopersonal" class="avatar">
      <div class="intro-text">
        <h1>~ codigopersonal<span class="cursor">█</span></h1>
        <p>Explorá mis proyectos, ideas y experimentos tech.</p>

        <h2>$ whoami</h2>
        <p>Marcelo — Automatización, Música, Código & Café ☕</p>
      </div>
    </div>

    <h2>$ ls proyectos/</h2>
    <ul id="repo-list">
      <li>Cargando proyectos...</li>
    </ul>

    <h2>$ cat apoyo.txt</h2>
    <p>¿Te sirvió algún proyecto? Invitame un café:</p>
    <p><a href="https://ko-fi.com/marcelolemos" target="_blank">☕ Apoyame en Ko-fi</a></p>

    <h2>$ contacto --redes</h2>
    <ul>
      <li><a href="https://maniat1k.github.io/main/">Blog</a></li>
    </ul>
  </div>

  <script>
    const repos = ["solarizedxterm", "windows11_fixMBR", "birame"];
    const user = "maniat1k";
    const cacheKey = "github_repo_cache";
    const cacheTimeKey = "github_repo_cache_time";
    const cacheDuration = 60 * 60 * 1000; // 1 hora

    function renderRepoList(data) {
      const list = document.getElementById("repo-list");
      list.innerHTML = "";

      data.sort((a, b) => b.stargazers_count - a.stargazers_count);

      data.forEach(repo => {
        const li = document.createElement("li");

        const link = document.createElement("a");
        link.href = repo.html_url;
        link.textContent = `★ ${repo.name}`;
        link.target = "_blank";
        link.style.color = "#00FF00";

        const stars = document.createElement("span");
        stars.textContent = ` — ${repo.stargazers_count} estrella${repo.stargazers_count !== 1 ? "s" : ""}`;
        stars.style.marginLeft = "0.5rem";

        const starBtn = document.createElement("a");
        starBtn.href = `${repo.html_url}/stargazers`;
        starBtn.textContent = "🌟 Dar estrella";
        starBtn.target = "_blank";
        starBtn.style.marginLeft = "1rem";
        starBtn.style.color = "#00FF00";

        li.appendChild(link);
        li.appendChild(stars);
        li.appendChild(starBtn);
        list.appendChild(li);
      });
    }

    async function fetchRepoData() {
      try {
        const data = await Promise.all(
          repos.map(repo =>
            fetch(`https://api.github.com/repos/${user}/${repo}`).then(res => res.json())
          )
        );
        localStorage.setItem(cacheKey, JSON.stringify(data));
        localStorage.setItem(cacheTimeKey, Date.now().toString());
        renderRepoList(data);
      } catch (error) {
        console.warn("Error al obtener datos de GitHub. Usando caché si existe.");
        const cached = localStorage.getItem(cacheKey);
        if (cached) renderRepoList(JSON.parse(cached));
      }
    }

    const lastFetch = localStorage.getItem(cacheTimeKey);
    if (!lastFetch || Date.now() - lastFetch > cacheDuration) {
      fetchRepoData();
    } else {
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        renderRepoList(JSON.parse(cached));
        fetchRepoData(); // refresco en segundo plano
      } else {
        fetchRepoData();
      }
    }
  </script>
</body>
</html>
