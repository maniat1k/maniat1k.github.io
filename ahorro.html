<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Ahorro con Tasas</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #fdfdfb;
      color: #333;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
    }
    h1, h2 {
      color: #2c3e50;
    }
    label {
      display: block;
      margin-top: 15px;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1em;
    }
    button {
      background-color: #b0b0b0;
      color: white;
      cursor: pointer;
      margin-top: 20px;
    }
    button:hover {
      background-color: #888;
    }
    .result {
      margin-top: 20px;
      font-weight: bold;
      background-color: #e9ecef;
      padding: 15px;
      border-radius: 5px;
      white-space: pre-line;
    }
    .nota-aviso {
      font-size: 0.85em;
      color: #888;
      margin-top: 8px;
    }
    .tasas {
      margin-top: 2rem;
      padding: 1rem;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #ccc;
      display: none;
    }
    .tasas table {
      width: 100%;
      border-collapse: collapse;
    }
    .tasas th, .tasas td {
      padding: 8px;
      border-bottom: 1px solid #ccc;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Calculadora de Ahorro</h1>

    <label>Seleccionar Banco:
      <select id="banco" onchange="mostrarTasas()">
        <option value="">-- Elegir --</option>
        <option value="BROU">BROU</option>
        <option value="ITAU">Itaú</option>
      </select>
    </label>

    <div id="tasasBROU" class="tasas">
      <h2>Plazos y Tasas – BROU</h2>
      <table>
        <thead><tr><th>Plazo</th><th>Tasa Estimada</th></tr></thead>
        <tbody>
          <tr><td>30–59 días</td><td>6.00%</td></tr>
          <tr><td>60–89 días</td><td>6.50%</td></tr>
          <tr><td>90–179 días</td><td>7.00%</td></tr>
          <tr><td>180–365 días</td><td>7.25%</td></tr>
        </tbody>
      </table>
    </div>

    <div id="tasasITAU" class="tasas">
      <h2>Plazos y Tasas – Itaú</h2>
      <table>
        <thead><tr><th>Plazo</th><th>Tasa Estimada</th></tr></thead>
        <tbody>
          <tr><td>30 días</td><td>6.5%</td></tr>
          <tr><td>60 días</td><td>7.0%</td></tr>
          <tr><td>91 días</td><td>7.2%</td></tr>
          <tr><td>181 días</td><td>7.5%</td></tr>
          <tr><td>270 días</td><td>7.75%</td></tr>
          <tr><td>367 días</td><td>8.0%</td></tr>
          <tr><td>547 días</td><td>8.1%</td></tr>
          <tr><td>732 días</td><td>8.2%</td></tr>
        </tbody>
      </table>
    </div>

    <label>Monto a invertir ($UYU): <input type="number" id="inversion" /></label>
    <label>Plazo en días: <input type="number" id="plazo" value="360" /></label>
    <label>Tasa de interés anual (%): <input type="number" id="tasa" step="0.01" /></label>

    <button onclick="calcularPlazo()">Calcular Ganancia</button>
    <div class="result" id="resultado"></div>
  </div>

  <script>
    function mostrarTasas() {
      document.getElementById("tasasBROU").style.display = "none";
      document.getElementById("tasasITAU").style.display = "none";
      const banco = document.getElementById("banco").value;
      if (banco === "BROU") {
        document.getElementById("tasasBROU").style.display = "block";
        document.getElementById("tasa").value = 7.25;
      } else if (banco === "ITAU") {
        document.getElementById("tasasITAU").style.display = "block";
        document.getElementById("tasa").value = 8.00;
      }
    }

    function calcularPlazo() {
      const inversion = parseFloat(document.getElementById('inversion').value);
      const tasa = parseFloat(document.getElementById('tasa').value);
      const plazo = parseInt(document.getElementById('plazo').value);
      if (!inversion || !tasa || !plazo) return;

      const interes = inversion * (tasa / 100) * (plazo / 365);
      const total = inversion + interes;

      document.getElementById('resultado').innerText =
        `Ganancia estimada: $${interes.toFixed(2)}
Total al vencimiento: $${total.toFixed(2)}`;
    }
  </script>
</body>
</html>
